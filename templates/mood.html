<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>気分の宙 — たより</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Courier+Prime&display=swap');
  /* ── 色の星空（2026-07-24 リデザイン）──
     封をされた未開封の手紙が、mood color の光の点として暗い空間に浮かぶ。
     見えるのは色だけ。日付・件名・残り日数はすべて出さない。
     タップしても中身は開かない——ほんの少し揺れて、「そこにある」ことだけが返る。
     同じ宙の遠くには、どこかの誰かの封の中の気分も、触れられない小さな星として瞬く。
     空は据え置きではなく、少しずつ今と同期する（60秒ごと・タブ復帰時）。 */
  :root{--space:#08080D;--chalk:#FAF8F3;--thread:#B38F6F}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--space);color:var(--chalk);overflow:hidden;
       font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
       -webkit-font-smoothing:antialiased}
  header{position:fixed;top:0;left:0;right:0;z-index:10;
         display:flex;justify-content:space-between;align-items:baseline;
         padding:16px 20px 12px}
  .ttl{font-size:15px;letter-spacing:0.18em;color:var(--chalk);opacity:.85}
  .ttl .romaji{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.34em;
               color:var(--thread);text-transform:uppercase;margin-left:10px}
  .back{font-size:12.5px;letter-spacing:0.1em;color:rgba(250,248,243,.55);text-decoration:none;
        border-bottom:1px solid rgba(179,143,111,.45);padding-bottom:1px;transition:color .2s}
  .back:hover{color:var(--chalk)}
  #sky{position:fixed;inset:0;background:var(--space);border-radius:12px;overflow:hidden}
  /* 点のタップ域：小さな星でも指で触れられるよう、透明の当たり判定を広めに取る */
  .star-hit{position:absolute;width:44px;height:44px;transform:translate(-50%,-50%);
            display:flex;align-items:center;justify-content:center;
            background:none;border:0;padding:0;cursor:default;-webkit-tap-highlight-color:transparent}
  .star-hit:focus{outline:none}
  /* 星＝手紙。大きさが開封日の近さ（大きい=近い、小さい=遠い）。数字にはしない */
  .star{border-radius:50%;pointer-events:none}
  /* 遠い星＝どこかの誰かの封の中の気分。触れられない・揺れない・ただ瞬く */
  .far-star{position:absolute;border-radius:50%;transform:translate(-50%,-50%);
            pointer-events:none;animation:twinkle 6s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:var(--op)}50%{opacity:calc(var(--op)*0.45)}}
  @media (prefers-reduced-motion:reduce){ .far-star{animation:none} }
  /* 空の入れ替わりは瞬きほどの淡い明滅で（据え置きの絵ではなく、少しずつ今と同期する） */
  #sky.settling{opacity:.4}
  #sky{transition:opacity .4s ease}
  @keyframes wobble{
    0%   { transform: translate(0, 0); }
    15%  { transform: translate(2px, -2px); }
    30%  { transform: translate(-1.5px, 1px); }
    45%  { transform: translate(1px, -0.5px); }
    60%  { transform: translate(-0.5px, 0.5px); }
    80%  { transform: translate(0.3px, -0.2px); }
    100% { transform: translate(0, 0); }
  }
  .star.wobble{animation:wobble .8s ease-out}
  @media (prefers-reduced-motion:reduce){ .star.wobble{animation:none} }
</style>
</head>
<body>
  <header>
    <div class="ttl">気分の宙<span class="romaji">Mood space</span></div>
    <a class="back" href="/">もどる</a>
  </header>

  <div id="sky" aria-label="封の中のたよりと、どこかの誰かの気分が、色の点として浮かんでいます"></div>

<script>
(function(){
  'use strict';

  const sky = document.getElementById('sky');
  const MARGIN = 0.08;        // 端から8%は空ける
  const SIZE_MIN = 5, SIZE_MAX = 28;
  const OP_MIN = 0.35, OP_MAX = 0.9;
  // 色を選ばず封じた手紙も「そこにある」：無彩の点として浮かべる
  const COLORLESS = 'hsl(228, 8%, 62%)';

  // 遠い星（他の人の気分）：小さく・淡く・触れられない
  const FAR_MIN = 1.5, FAR_MAX = 4;
  const FAR_OP_MIN = 0.10, FAR_OP_MAX = 0.26;

  let stars = [];      // 本人の {c, d}。保持したままリサイズで置き直す
  let farStars = [];   // 他の人の色（量子化済みhex）の配列

  // 大きい点から順に、重ならない場所を探して散布する（見つからなければ最後の候補で妥協）
  function layout(){
    sky.textContent = '';
    const W = sky.clientWidth, H = sky.clientHeight;
    if (!W || !H) return;

    // 遠い星は奥に沈める：当たり判定なし・衝突判定なし（小さいので重なっても瞬きに紛れる）
    farStars.forEach(c => {
      const dot = document.createElement('span');
      dot.className = 'far-star';
      const size = FAR_MIN + Math.random() * (FAR_MAX - FAR_MIN);
      dot.style.width = dot.style.height = size.toFixed(1) + 'px';
      dot.style.background = c;
      dot.style.setProperty('--op', (FAR_OP_MIN + Math.random() * (FAR_OP_MAX - FAR_OP_MIN)).toFixed(2));
      dot.style.animationDelay = (-Math.random() * 6).toFixed(1) + 's';
      dot.style.left = (Math.random() * 100) + '%';
      dot.style.top  = (Math.random() * 100) + '%';
      sky.appendChild(dot);
    });

    if (!stars.length) return;   // 自分の手紙が0通でも、誰かの遠い星は瞬いている

    const maxDays = Math.max(30, ...stars.map(p => p.d));
    const items = stars.map(p => {
      const ratio = 1 - (p.d / maxDays);     // 0=最も遠い未来 〜 1=もうすぐ開封
      return {
        c: p.c || COLORLESS,
        size: SIZE_MIN + ratio * (SIZE_MAX - SIZE_MIN),
        op: OP_MIN + ratio * (OP_MAX - OP_MIN),
      };
    }).sort((a, b) => b.size - a.size);

    const placed = [];
    items.forEach(it => {
      let x = 0, y = 0, ok = false;
      for (let t = 0; t < 240 && !ok; t++){
        x = (MARGIN + Math.random() * (1 - MARGIN * 2)) * W;
        y = (MARGIN + Math.random() * (1 - MARGIN * 2)) * H;
        ok = placed.every(q => {
          const min = (it.size + q.size) / 2 + 10;   // 円同士の最低距離
          return (x - q.x) ** 2 + (y - q.y) ** 2 >= min * min;
        });
      }
      placed.push({ x: x, y: y, size: it.size });

      const hit = document.createElement('div');
      hit.className = 'star-hit';
      hit.style.left = (x / W * 100) + '%';
      hit.style.top  = (y / H * 100) + '%';
      const dot = document.createElement('span');
      dot.className = 'star';
      dot.style.width = dot.style.height = it.size.toFixed(1) + 'px';
      dot.style.background = it.c;
      dot.style.opacity = it.op.toFixed(2);
      hit.appendChild(dot);
      // タップ＝小さく揺れる。それだけ。中身も開封日も出ない。
      hit.addEventListener('pointerdown', function(){
        dot.classList.remove('wobble');
        void dot.offsetWidth;               // アニメーションを掛け直すための reflow
        dot.classList.add('wobble');
      });
      sky.appendChild(hit);
    });
  }

  let resizeQueued = false;
  window.addEventListener('resize', function(){
    if (resizeQueued) return;
    resizeQueued = true;
    requestAnimationFrame(function(){ resizeQueued = false; layout(); });
  });

  // ── 今との同期 ──
  // サーバは毎回シャッフルして返すので、並びに依らない鍵で「本当に変わったか」を見る。
  // 変わった時だけ、空をいちど淡くしてから置き直す（変わっていなければ星は動かさない）。
  let lastKey = null;

  function skyKey(d){
    const own = (d.points || []).map(p => (p.c || '') + '/' + p.d).sort();
    const far = (d.others || []).slice().sort();
    return own.join(',') + '|' + far.join(',');
  }

  function fetchSky(){
    fetch('/api/mood-space')
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        const key = skyKey(d);
        if (key === lastKey) return;
        const first = (lastKey === null);
        lastKey = key;
        stars = d.points || [];
        farStars = d.others || [];
        if (first){ layout(); return; }
        sky.classList.add('settling');
        setTimeout(function(){ layout(); sky.classList.remove('settling'); }, 400);
      })
      .catch(() => {});   // 失敗しても暗闇のまま（この画面にエラーの文字は置かない）
  }

  fetchSky();
  setInterval(fetchSky, 60000);                    // 60秒ごと＝サーバ側キャッシュと同じ周期
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden) fetchSky();              // タブに戻ってきた時は待たずに今へ
  });
})();
</script>
</body>
</html>
