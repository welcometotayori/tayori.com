<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>気分の宙 — たより</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Courier+Prime&display=swap');
  /* ══ 気分の宙 v7（2026-07-24）══════════════════════════
     星は点ではなく、語そのもの。手紙のタグが宙に浮かぶ。

     【位置｜重み付きMDS（Kamada-Kawai）】
        D(i,j) = √( Σ w_v · d_v(i,j)² ) / √( Σ w_v )
        L(i,j) = L_MIN + D · (L_MAX − L_MIN)
        F(i,j) = k · ( ‖p_i − p_j‖ − L(i,j) )
        w_tag = 1.0 を主軸に、8変数すべてが座標に参加する。

     【動き｜時間の変数を運動に割り当てる】
        落ち着き　　＝ 封じてからの経過（古い語ほど止まる）
        現れる遅さ　＝ 開封日までの距離（遠い語ほどゆっくり滲み出る）
        呼吸の周期　＝ 開封までの残り時間（脈拍には見えない速さに抑える）
        入る方向　　＝ 時間帯（朝は上から、夜は下から。昼は右、夕は左）

     【非位置チャネル】
        大きさ＝開封日の近さ／色相＝気分の色／彩度＝季節
        明度＝時間帯／不透明度＝経過／瞬きとにじみ＝天気

     数字も凡例も軸も出さない。操作もない。一方通行の宙。
     ════════════════════════════════════════════════ */
  :root{--space:#08080D;--chalk:#FAF8F3;--thread:#B38F6F}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--space);color:var(--chalk);
       font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
       -webkit-font-smoothing:antialiased}
  header{position:fixed;top:0;left:0;right:0;z-index:10;
         display:flex;justify-content:space-between;align-items:baseline;
         padding:16px 20px 12px;pointer-events:none}
  .ttl{font-size:15px;letter-spacing:0.18em;color:var(--chalk);opacity:.85}
  .ttl .romaji{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.34em;
               color:var(--thread);text-transform:uppercase;margin-left:10px}
  .back{font-size:12.5px;letter-spacing:0.1em;color:rgba(250,248,243,.55);text-decoration:none;
        border-bottom:1px solid rgba(179,143,111,.45);padding-bottom:1px;transition:color .2s;
        pointer-events:auto}
  .back:hover{color:var(--chalk)}
  canvas{position:fixed;inset:0;display:block}
  /* スクリーンリーダー向けの語リスト（視覚的には出さない） */
  .sr-words{position:absolute;width:1px;height:1px;overflow:hidden;
            clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;margin:-1px}
</style>
</head>
<body>
  <header>
    <div class="ttl">気分の宙<span class="romaji">Mood space</span></div>
    <a class="back" href="/">もどる</a>
  </header>
  <canvas id="sky" aria-label="封じられた手紙の言葉が、色を持って浮かんでいます"></canvas>
  <ul class="sr-words" id="skyWords" aria-label="いま宙にある言葉"></ul>

<script>
(function(){
  'use strict';
  const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
  const srList=document.getElementById('skyWords');
  const REDUCED=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W=0,H=0,DPR=1,t=0;

  /* ── 重み：語が主軸 ── */
  const WEIGHT={ tag:1.00, hue:0.25, area:0.20, season:0.15, band:0.15,
                 until:0.10, since:0.10, weather:0.10 };
  let WSUM=0; for(const k in WEIGHT) WSUM+=WEIGHT[k];
  const WNORM=Math.sqrt(WSUM);

  /* ── バネ ── */
  const L_MIN=30, L_MAX=560, K_SPRING=0.0026, K_REPEL=0.055, K_CENTER=0.00018;

  /* ── 動きの意味（時間の変数）── */
  const DAMP_NEW=0.940, DAMP_OLD=0.780;         // 落ち着き＝経過
  const ARRIVE_MIN=90,  ARRIVE_SPAN=420;        // 現れる遅さ＝開封までの距離
  const BREATH_SLOW=0.0022, BREATH_SPAN=0.0042; // 呼吸＝残り時間（脈に見えない速さ）
  const ENTRY_DEG={ morning:-90, noon:0, evening:180, night:90 }; // 入る方向＝時間帯
  const FADE_OUT=90;                            // 開封された手紙の語が消えるまで（frames）
  const MAX_WORDS=150;                          // 語の上限（step は O(n²)）

  /* ── 非位置チャネル ── */
  const SIZE_MIN=11, SIZE_MAX=30, HORIZON=400;
  const OP_NEW=0.95, OP_OLD=0.24, FADE_SPAN=730;
  const SAT_LOW=16, SAT_HIGH=70, LUM_NIGHT=46, LUM_MORNING=88;

  const WEATHER={
    clear:{speed:2.0,depth:0.38,blur:0.35}, cloud:{speed:0.7,depth:0.12,blur:0.9},
    rain:{speed:1.1,depth:0.26,blur:1.9},   snow:{speed:0.42,depth:0.30,blur:1.4}
  };
  const WDIST={
    clear:{clear:0,cloud:0.35,rain:0.85,snow:0.75},
    cloud:{clear:0.35,cloud:0,rain:0.45,snow:0.50},
    rain:{clear:0.85,cloud:0.45,rain:0,snow:0.40},
    snow:{clear:0.75,cloud:0.50,rain:0.40,snow:0}
  };
  const SEASON={spring:0.62,summer:1.0,autumn:0.44,winter:0.0};
  const SEASON_DEG={spring:90,summer:180,autumn:270,winter:0};
  const BAND={morning:1.0,noon:0.78,evening:0.42,night:0.0};
  const BAND_DEG={morning:90,noon:180,evening:270,night:0};

  let words=[], letters=[];
  const byId=new Map();      // 手紙id(ハッシュ) → L。60秒ごとの差分同期に使う
  const areaPhase={};        // 同じ土地の語は一緒に息をする（場所→位相）
  let wuid=0;                // 語の通し番号＝Dキャッシュの鍵
  const dcache=new Map();    // "uidA:uidB" → D(i,j)。入力が不変なので毎フレーム再計算しない

  function resize(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=innerWidth;H=innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;
    cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize',resize);

  /* 前後の空白・記号を落とし、全角英数→半角・大文字→小文字。
     かな/カナ・漢字/かなは寄せない（表記も本人の選択であるため）。 */
  function normTag(s){
    let x=String(s||'').trim().toLowerCase();
    x=x.replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    return x.replace(/^[\s、。,.!?！？「」『』\-–—_#]+|[\s、。,.!?！？「」『』\-–—_#]+$/g,'');
  }
  function circ(a,b,p){ let d=Math.abs(a-b)%p; if(d>p/2) d=p-d; return d/(p/2); }
  function jac(A,B){ let n=0; A.forEach(v=>{if(B.has(v))n++;}); const u=A.size+B.size-n; return u?1-n/u:1; }
  function dTag(a,b){ if(a.tag===b.tag) return 0; if(a.L===b.L) return 0.55; return jac(a.L.set,b.L.set); }

  function D(a,b){
    const A=a.L,B=b.L; let s=0;
    s+=WEIGHT.tag*Math.pow(dTag(a,b),2);
    s+=WEIGHT.hue*Math.pow((A.hue==null||B.hue==null)?0.5:circ(A.hue,B.hue,360),2);
    s+=WEIGHT.area*Math.pow(A.area===B.area?0:1,2);
    s+=WEIGHT.season*Math.pow(circ(SEASON_DEG[A.season]||0,SEASON_DEG[B.season]||0,360),2);
    s+=WEIGHT.band*Math.pow(circ(BAND_DEG[A.band]||0,BAND_DEG[B.band]||0,360),2);
    s+=WEIGHT.until*Math.pow(Math.abs(A.until-B.until)/HORIZON,2);
    s+=WEIGHT.since*Math.pow(Math.abs(A.since-B.since)/FADE_SPAN,2);
    s+=WEIGHT.weather*Math.pow((WDIST[A.weather]||WDIST.cloud)[B.weather]||0.5,2);
    return Math.sqrt(s)/WNORM;
  }
  function Dc(a,b){
    const k=a.uid<b.uid?a.uid+':'+b.uid:b.uid+':'+a.uid;
    let v=dcache.get(k);
    if(v===undefined){ v=D(a,b); dcache.set(k,v); }
    return v;
  }

  function seal(d){
    const tags=(d.tags||[]).map(normTag).filter(Boolean).slice(0,3);
    if(!tags.length) return;
    if(areaPhase[d.area]===undefined) areaPhase[d.area]=Math.random()*Math.PI*2;

    const until=Math.min(Math.max(0,d.daysUntilOpen||0),HORIZON);
    const since=Math.min(Math.max(0,d.daysSinceSealed||0),FADE_SPAN);
    const near = 1-until/HORIZON;          // 0=遠い未来 … 1=もうすぐ開く
    const age  = since/FADE_SPAN;          // 0=封じたばかり … 1=古い

    const L={
      id:d.id, set:new Set(tags), hue:d.hue, area:d.area, season:d.season, band:d.band,
      weather:(WEATHER[d.weather]?d.weather:'cloud'), until:until, since:since,
      size: SIZE_MIN+near*(SIZE_MAX-SIZE_MIN),
      op:   OP_NEW+age*(OP_OLD-OP_NEW),
      sat:  SAT_LOW+(SEASON[d.season]??0.5)*(SAT_HIGH-SAT_LOW),
      lum:  LUM_NIGHT+(BAND[d.band]??0.5)*(LUM_MORNING-LUM_NIGHT),
      wx:   WEATHER[d.weather]||WEATHER.cloud,
      aph:  areaPhase[d.area], born:t, words:[], dying:0,
      // ── 動きの意味 ──
      damp:   DAMP_NEW+age*(DAMP_OLD-DAMP_NEW),          // A: 古いほど止まる
      arrive: REDUCED?90:ARRIVE_MIN+(until/HORIZON)*ARRIVE_SPAN, // B: 遠いほど遅く現れる
      omega:  BREATH_SLOW+near*BREATH_SPAN               // C: 近いほど短い周期
    };

    // 入ってくる方向＝時間帯
    const deg=(ENTRY_DEG[d.band]??0)*Math.PI/180;
    const jitter=(Math.random()-0.5)*0.5;
    const R=Math.max(W,H)*0.78;
    const ex=W/2+Math.cos(deg+jitter)*R, ey=H/2+Math.sin(deg+jitter)*R;

    tags.forEach(tag=>{
      const w={ tag:tag, L:L, uid:wuid++, ph:Math.random()*Math.PI*2,
        x:ex+(Math.random()-0.5)*40, y:ey+(Math.random()-0.5)*40,
        vx:0, vy:0, born:t, hw:0 };
      // 文字幅を生成時に確定させる（初回フレームの反発抜けを防ぐ）
      ctx.font=`500 ${L.size.toFixed(1)}px 'Shippori Mincho',serif`;
      w.hw=ctx.measureText(tag).width;
      words.push(w); L.words.push(w);
    });
    letters.push(L);
    byId.set(d.id,L);
  }

  // 開封された（宙から消えるべき）手紙：語をフェードアウトへ
  function unseal(L){ if(!L.dying) L.dying=t||1; }

  // フェードアウトが終わった手紙を配列から外し、Dキャッシュも無効化する
  function cleanup(){
    for(let i=letters.length-1;i>=0;i--){
      const L=letters[i];
      if(!L.dying||t-L.dying<FADE_OUT) continue;
      L.words.forEach(w=>{
        const idx=words.indexOf(w);
        if(idx>=0) words.splice(idx,1);
        for(const k of dcache.keys()){
          const p=k.split(':');
          if(+p[0]===w.uid||+p[1]===w.uid) dcache.delete(k);
        }
      });
      letters.splice(i,1);
      byId.delete(L.id);
    }
  }

  function step(){
    const n=words.length;
    for(let i=0;i<n;i++){
      for(let j=i+1;j<n;j++){
        const a=words[i],b=words[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||0.01;
        const ux=dx/d, uy=dy/d;
        const Dij=Dc(a,b);
        const Lij=L_MIN+Dij*(L_MAX-L_MIN);
        // 引く力のみ距離で減衰（遠いペアまで等しく引くと宙全体が団子になる）
        const k=(d>Lij)?K_SPRING*(1-Dij*0.75):K_SPRING;
        const f=(d-Lij)*k;
        a.vx+=ux*f; a.vy+=uy*f; b.vx-=ux*f; b.vy-=uy*f;
        const min=(a.hw+b.hw)*0.55+10;
        if(d<min){
          const r=(min-d)*K_REPEL;
          a.vx-=ux*r; a.vy-=uy*r; b.vx+=ux*r; b.vy+=uy*r;
        }
      }
    }
    words.forEach(w=>{
      w.vx+=(W/2-w.x)*K_CENTER; w.vy+=(H/2-w.y)*K_CENTER;
      // 落ち着き＝経過。新しい語ほど減衰が弱く、まだ位置が定まらない
      w.vx*=w.L.damp; w.vy*=w.L.damp;
      w.x+=w.vx; w.y+=w.vy;
      const m=30;
      w.x=Math.max(m,Math.min(W-m,w.x));
      w.y=Math.max(m,Math.min(H-m,w.y));
    });
  }

  function fadeOf(L){
    let f=Math.min(1,(t-L.born)/L.arrive);
    f=f*f*(3-2*f);                                   // smoothstep
    if(L.dying) f*=Math.max(0,1-(t-L.dying)/FADE_OUT);
    return f;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';

    // 糸：同じ手紙から生まれた語どうし。ほぼ見えない濃度に留める
    ctx.lineWidth=0.5;
    letters.forEach(L=>{
      const arr=Math.min(1,(t-L.born)/L.arrive);
      if(arr<0.6||L.words.length<2) return;
      const f=L.dying?Math.max(0,1-(t-L.dying)/FADE_OUT):1;
      if(f<=0) return;
      ctx.strokeStyle=`rgba(179,143,111,${(0.05*arr*f).toFixed(3)})`;
      for(let i=0;i<L.words.length;i++) for(let j=i+1;j<L.words.length;j++){
        ctx.beginPath();
        ctx.moveTo(L.words[i].x,L.words[i].y);
        ctx.lineTo(L.words[j].x,L.words[j].y);
        ctx.stroke();
      }
    });

    words.forEach(w=>{
      const L=w.L;
      // 現れる遅さ＝開封までの距離（開封済みはここで滲み消える）
      const ease=fadeOf(L);
      if(ease<=0) return;
      // 瞬き＝天気。位相は語ごと（全語が同時に瞬かないように）
      const tw=REDUCED?1:1-L.wx.depth*(0.5+0.5*Math.sin(t*0.018*L.wx.speed+w.ph));
      // 呼吸＝残り時間。位相は場所で揃う
      const breath=REDUCED?1:0.86+0.14*Math.sin(t*L.omega+L.aph);
      const op=L.op*tw*breath*ease;
      const size=L.size*(0.82+0.18*ease);
      const col=(l,o)=> L.hue==null
        ? `hsla(228,7%,${l}%,${o})`
        : `hsla(${L.hue},${L.sat}%,${l}%,${o})`;

      ctx.font=`500 ${size.toFixed(1)}px 'Shippori Mincho','Hiragino Mincho ProN',serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=col(L.lum,Math.min(1,op*0.85));
      ctx.shadowBlur=size*L.wx.blur;
      ctx.fillStyle=col(Math.min(94,L.lum+8),op);
      ctx.fillText(w.tag,w.x,w.y);
      ctx.shadowBlur=0;
    });
    ctx.globalCompositeOperation='source-over';
  }

  function loop(){ t++; cleanup(); step(); draw(); requestAnimationFrame(loop); }

  /* ── 今との同期（60秒ごと・タブ復帰時）──
     差分のみ反映する：新しい手紙は seal()、消えた手紙（開封済み）はフェードアウト。
     全再構築はしない（位置の記憶＝宙の連続性を保つ）。 */
  function sync(data){
    const incoming=new Map();
    (data.letters||[]).forEach(d=>{
      if(d&&d.id&&(d.tags||[]).length) incoming.set(d.id,d);
    });
    // 語150の定員：封じてから日が浅い（新しい）手紙を優先して残す
    let count=0; const keep=new Set();
    [...incoming.values()]
      .sort((a,b)=>(a.daysSinceSealed||0)-(b.daysSinceSealed||0))
      .forEach(d=>{
        const n=Math.min((d.tags||[]).length,3);
        if(count+n<=MAX_WORDS){ count+=n; keep.add(d.id); }
      });
    byId.forEach((L,id)=>{ if(!keep.has(id)) unseal(L); });
    keep.forEach(id=>{ if(!byId.has(id)) seal(incoming.get(id)); });
    updateWordList();
  }

  // スクリーンリーダー向け：いま宙にある語だけ（色・位置・日付は読み上げない）
  function updateWordList(){
    const seen=new Set();
    let h='';
    letters.forEach(L=>{
      if(L.dying) return;
      L.words.forEach(w=>{
        if(seen.has(w.tag)) return;
        seen.add(w.tag);
        h+='<li>'+w.tag.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</li>';
      });
    });
    srList.innerHTML=h;
  }

  function fetchSky(){
    fetch('/api/mood-space')
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d) sync(d); })
      .catch(()=>{});   // 失敗しても暗闇のまま（この画面にエラーの文字は置かない）
  }

  resize();
  loop();
  fetchSky();
  setInterval(fetchSky,60000);                      // 60秒＝サーバ側キャッシュと同じ周期
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden) fetchSky();                // タブに戻ってきた時は待たずに今へ
  });
})();
</script>
</body>
</html>
