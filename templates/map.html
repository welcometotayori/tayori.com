<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封をした場所 — たより</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Courier+Prime&display=swap');
  :root{--paper:#F2EBDD;--paper-2:#EDE3D1;--ink:#3A2E25;--ink-soft:#6A5A4C;--seal:#B5543A;--line:#CBBBA0}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);
       font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
       display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  header{display:flex;justify-content:space-between;align-items:baseline;
         padding:16px 20px 12px;border-bottom:1px solid var(--line);background:var(--paper)}
  .ttl{font-size:15px;letter-spacing:0.18em}
  .ttl .romaji{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.34em;
               color:var(--ink-soft);text-transform:uppercase;margin-left:10px}
  .back{font-size:12.5px;letter-spacing:0.1em;color:var(--ink-soft);text-decoration:none;
        border-bottom:1px solid var(--line);padding-bottom:1px}
  .back:hover{color:var(--ink)}
  #map{flex:1;background:var(--paper-2)}
  /* タイルを紙の世界観へ少しだけ寄せる（彩度を落とし、わずかにセピアへ） */
  .leaflet-tile{filter:grayscale(.3) sepia(.16) saturate(.8) brightness(1.02)}
  /* 点に触れた時のささやき（エリア名と時間帯だけ） */
  .area-tip{background:var(--paper-2);border:1px solid var(--line);border-radius:2px;
            color:var(--ink);font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;
            font-size:12px;letter-spacing:0.08em;padding:5px 10px;
            box-shadow:0 6px 18px -10px rgba(58,46,37,.5)}
  .area-tip::before{display:none}
  .leaflet-container{font-family:inherit}
  /* 位置情報がまだ許されていない時の、手紙のことばでの頼み（OS風の文言は使わない） */
  .geo-ask{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000;
    width:min(420px,calc(100% - 32px));background:var(--paper-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 20px 16px;box-shadow:0 18px 44px -18px rgba(58,46,37,.6);
    animation:geoIn .5s ease both;transition:opacity .4s,transform .4s}
  .geo-ask.bye{opacity:0;transform:translateX(-50%) translateY(8px);pointer-events:none}
  @keyframes geoIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
  .geo-ask p{margin:0 0 14px;font-size:13px;line-height:2;letter-spacing:0.04em;color:var(--ink)}
  .geo-actions{display:flex;gap:10px;flex-wrap:wrap}
  .geo-actions button{font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;font-size:12.5px;letter-spacing:0.08em;
    cursor:pointer;border-radius:22px;padding:9px 18px;transition:.2s}
  .geo-yes{background:var(--ink);color:var(--paper);border:1px solid var(--ink)}
  .geo-yes:hover{opacity:.86}
  .geo-no{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .geo-no:hover{color:var(--ink);border-color:var(--ink-soft)}
  @media (prefers-reduced-motion:reduce){.geo-ask{animation:none;transition:none}}
</style>
</head>
<body>
  <header>
    <div class="ttl">封をした場所<span class="romaji">Where sealed</span></div>
    <a class="back" href="/">もどる</a>
  </header>
  <div id="map"></div>

  <!-- 位置情報がまだ許されていない時だけ現れる、手紙からの小さな頼み -->
  <div class="geo-ask" id="geoAsk" hidden>
    <p>たよりは、封をした場所をしずかにおぼえています。<br>
       いまの居場所を知らせておくと、つぎに封をしたとき、その土地の名まえがこの地図に残ります。</p>
    <div class="geo-actions">
      <button class="geo-yes" id="geoYes">居場所を、たよりに知らせる</button>
      <button class="geo-no" id="geoNo">このままで</button>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(async function(){
  const map=L.map('map',{zoomControl:true,attributionControl:true});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // 点の色は「状態」で分ける（3色）。
  //   現在地＝青 / 保存した場所（未開封）＝朱（封蝋の色） / 開封後の場所＝灰緑
  // 表示は非対称：未開封は「場所名」だけ、現在地と開封後は「日時・時間帯・天気」＝時間と空気が主役。
  const C_CURRENT='#5C7FA6', C_UNREAD='#B5543A', C_OPENED='#7D8B72';
  const BUCKET_JP={morning:'朝',day:'昼',evening:'夕',night:'夜'};
  const WX_JP={snow:'雪',rain:'雨',fog:'霧',cloud:'曇り',clear:'晴れ'};

  // 「2026.7.16 21:30」の形。時間の記録は簡素に、数字だけで。
  function fmtWhen(iso){
    if(!iso)return '';
    const d=new Date(iso);if(isNaN(d))return '';
    return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()+' '+
           d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function airLabel(when,bucket,wx){
    const parts=[];
    const w=fmtWhen(when);if(w)parts.push(w);
    if(BUCKET_JP[bucket])parts.push(BUCKET_JP[bucket]);
    if(wx&&WX_JP[wx.condition])parts.push(WX_JP[wx.condition]+(wx.temp!=null?' '+Math.round(wx.temp)+'℃':''));
    return parts.join(' · ');
  }
  function whisper(m,label){
    if(!label)return;
    m.bindTooltip(label,{direction:'top',offset:[0,-6],className:'area-tip',opacity:1});
    m.on('click',()=>m.openTooltip());  // タッチ端末でも触れたら囁く
  }

  let points=[];
  try{
    const r=await fetch('/api/map',{credentials:'same-origin'});
    if(r.status===401){location.href='/';return;}
    points=((await r.json())||{}).points||[];
  }catch(e){/* 取れなくても地図はそのまま（説明文は出さない） */}

  const latlngs=[];
  points.forEach(p=>{
    if(p.area_lat==null||p.area_lng==null)return;
    const ll=[p.area_lat,p.area_lng];latlngs.push(ll);
    const m=L.circleMarker(ll,{
      radius:7,stroke:false,
      fillColor:p.opened?C_OPENED:C_UNREAD,
      fillOpacity:0.35   // 同じエリアの点は重ねて描き、重なるほど自然に濃くなる
    }).addTo(map);
    // 未開封＝場所そのものが主役（場所名だけ）。開封後＝封をした時間と空気が主役。
    whisper(m,p.opened?airLabel(p.sent_at,p.time_bucket,p.weather):(p.area_name||''));
  });

  if(latlngs.length){
    map.fitBounds(L.latLngBounds(latlngs),{padding:[48,48],maxZoom:14});
  }else{
    map.setView([30,15],2);  // まだ点がない時は、固定の静かな世界図
  }

  // ── 現在地の点（青）：いまの日時・時間帯・天気をまとう ──
  // 位置の許可がある時だけ静かに現れる。座標は表示前に小数第3位へ丸める（生座標は描かない）。
  function timeBucket(){
    const h=new Date().getHours();
    if(h>=5&&h<11)return 'morning';
    if(h>=11&&h<17)return 'day';
    if(h>=17&&h<21)return 'evening';
    return 'night';
  }
  async function showCurrentPin(){
    if(!navigator.geolocation)return;
    const pos=await new Promise(res=>{
      let done=false;const fin=v=>{if(!done){done=true;res(v);}};
      navigator.geolocation.getCurrentPosition(p=>fin(p),()=>fin(null),
        {timeout:10000,maximumAge:600000,enableHighAccuracy:false});
      setTimeout(()=>fin(null),11000);
    });
    if(!pos)return;  // 取れなければ無言で引き下がる
    const lat=Math.round(pos.coords.latitude*1000)/1000,
          lng=Math.round(pos.coords.longitude*1000)/1000;
    let wx=null;
    try{
      const r=await fetch('/api/weather?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude,{credentials:'same-origin'});
      const w=await r.json();
      if(w&&w.ok)wx={condition:w.condition,temp:w.temp};
    }catch(e){}
    const m=L.circleMarker([lat,lng],{
      radius:8,color:C_CURRENT,weight:2,opacity:0.9,
      fillColor:C_CURRENT,fillOpacity:0.55
    }).addTo(map);
    whisper(m,airLabel(new Date().toISOString(),timeBucket(),wx));
    if(!latlngs.length)map.setView([lat,lng],12);  // 封じた点がまだ無ければ、いまの空の下から始める
  }
  // 既に許可されている時だけ黙って描く（許可を求めるのは下の geoAsk カードの役目）
  if(navigator.permissions&&navigator.permissions.query){
    navigator.permissions.query({name:'geolocation'})
      .then(st=>{if(st.state==='granted')showCurrentPin();})
      .catch(()=>{});
  }

  // ── 位置情報の許しがまだ無い時：手紙のことばで、そっと頼む ──
  // OS標準風の「位置情報をオンにしてください」は使わない。断られたら（応答が無くても）
  // エラーも文言も出さず、静かに引き下がる（憲法：拒否・失敗時は無言）。
  (function(){
    const card=document.getElementById('geoAsk');
    if(!card||!navigator.geolocation)return;
    const show=()=>{card.hidden=false;};
    const hide=()=>{card.classList.add('bye');setTimeout(()=>{card.hidden=true;},450);};
    if(navigator.permissions&&navigator.permissions.query){
      navigator.permissions.query({name:'geolocation'})
        .then(st=>{if(st.state!=='granted')show();})
        .catch(show);  // 判定できないブラウザでは、とりあえず頼んでみる
    }else{show();}
    document.getElementById('geoYes').addEventListener('click',()=>{
      let done=false;const fin=ok=>{if(!done){done=true;hide();if(ok)showCurrentPin();}};
      navigator.geolocation.getCurrentPosition(()=>fin(true),()=>fin(false),{timeout:10000,maximumAge:600000,enableHighAccuracy:false});
      setTimeout(()=>fin(false),11000);  // 応答が無くても止まらない保険
    });
    document.getElementById('geoNo').addEventListener('click',hide);
  })();
})();
</script>
</body>
</html>
