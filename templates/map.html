<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封をした場所 — たより</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!-- ShadeMapの標高タイル（S3）へ先につないでおく：初回の影の表示を速くする -->
<link rel="preconnect" href="https://s3.amazonaws.com" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Courier+Prime&display=swap');
  :root{
    /* ベース4色（確定・変更不可）＋ color-mix 派生。個別のhexを足さない */
    --paper:#FAF8F3;--ground:#E8E2D8;--ink:#2A2522;--seal:#710014;--kraft:#B38F6F;
    --paper-sunk:color-mix(in oklab,var(--paper) 93%,var(--kraft));
    --paper-raised:#FFFFFF;
    --ink-body:color-mix(in oklab,var(--ink) 82%,var(--paper));
    --ink-mute:color-mix(in oklab,var(--ink) 52%,var(--paper));
    --rule:color-mix(in oklab,var(--kraft) 38%,var(--paper));
    --rule-firm:color-mix(in oklab,var(--kraft) 62%,var(--paper));
    --seal-hover:color-mix(in oklab,var(--seal) 86%,var(--ink));
    --seal-quiet:color-mix(in oklab,var(--seal) 14%,var(--paper));
    --seal-onfill:var(--paper);
    --focus-ring:color-mix(in oklab,var(--seal) 55%,var(--paper));
    /* 気分7色（凪→芽→陽→温→恋→憂→沈の温度順） */
    --mood-nagi:#C9D4D2;--mood-me:#C4CDB4;--mood-hi:#EBD9AE;--mood-on:#E8C4A8;
    --mood-koi:#DFAFAE;--mood-yuu:#C0B2C4;--mood-shizumi:#8C7F80;
    --mood-sealed:color-mix(in oklab,var(--kraft) 22%,var(--paper));
    /* aura の実データ調整口 */
    --aura-blur:28px;
    --aura-opacity:0.42}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ground);color:var(--ink);
       font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
       display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-break:strict}
  /* 日本語の折り返し：定型文は文節（<wbr>）と句読点の後でだけ折る */
  .geo-ask p{word-break:keep-all;overflow-wrap:anywhere;text-wrap:pretty}
  header{display:flex;justify-content:space-between;align-items:baseline;
         padding:16px 20px 12px;border-bottom:1px solid var(--rule);background:var(--paper)}
  .ttl{font-size:15px;letter-spacing:0.18em}
  .ttl .romaji{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.34em;
               color:var(--ink-mute);text-transform:uppercase;margin-left:10px}
  .back{font-size:12.5px;letter-spacing:0.1em;color:var(--ink-mute);text-decoration:none;
        border-bottom:1px solid var(--rule);padding-bottom:1px}
  .back:hover{color:var(--ink)}
  #map{flex:1;background:var(--paper)}
  /* ベースタイルを紙に寄せる（タイル自体はCarto Positronの淡いもの前提） */
  .leaflet-tile-pane{filter:grayscale(1) contrast(0.82) brightness(1.06) sepia(0.14)}
  .leaflet-container{background:var(--paper);font-family:inherit}
  /* 点に触れた時のささやき（エリア名と時間帯だけ） */
  .area-tip,.mood-tip{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;
            color:var(--ink);font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;
            font-size:12px;letter-spacing:0.08em;padding:5px 10px;
            box-shadow:0 6px 18px -10px rgba(90,70,50,.5)}
  .area-tip::before,.mood-tip::before{display:none}
  /* ── 気分の aura ──
     --aura-color をアニメーション可能にする（開封時に --mood-sealed → 合成色へ0.9s）。
     @property 未対応ブラウザでは遷移せず即時反映になるだけ（成立はする）。 */
  @property --aura-color{syntax:'<color>';inherits:false;initial-value:transparent}
  .mood-aura{
    border-radius:50%;
    mix-blend-mode:multiply;
    opacity:var(--aura-opacity);
    filter:blur(var(--aura-blur));
    /* closest-side を使う：farthest-corner だと角まで伸びて縁が四角く見える */
    background:radial-gradient(circle closest-side,
                var(--aura-color) 0%,
                transparent 72%);
    will-change:transform;
    transition:opacity .4s ease,--aura-color .9s ease}
  @media (prefers-reduced-motion:reduce){
    .mood-aura{transition:none}}
  /* エリアの点：紙色の細いリング（SVG strokeで描く）＋わずかな影で aura の上でも沈まない */
  .mood-dot{filter:drop-shadow(0 1px 2px color-mix(in oklab,var(--ink) 18%,transparent))}
  /* 未開封の気配：ごく薄い無彩色の輪。色は出さない */
  .mood-sealed-ring{border:1px solid var(--rule);border-radius:50%;opacity:.5}
  /* 位置情報がまだ許されていない時の、手紙のことばでの頼み（OS風の文言は使わない） */
  .geo-ask{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000;
    width:min(420px,calc(100% - 32px));background:var(--paper);border:1px solid var(--rule);border-radius:4px;
    padding:18px 20px 16px;box-shadow:0 18px 44px -18px rgba(90,70,50,.6);
    animation:geoIn .5s ease both;transition:opacity .4s,transform .4s}
  .geo-ask.bye{opacity:0;transform:translateX(-50%) translateY(8px);pointer-events:none}
  @keyframes geoIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
  .geo-ask p{margin:0 0 14px;font-size:13px;line-height:2;letter-spacing:0.04em;color:var(--ink)}
  .geo-actions{display:flex;gap:10px;flex-wrap:wrap}
  .geo-actions button{font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;font-size:12.5px;letter-spacing:0.08em;
    cursor:pointer;border-radius:22px;padding:9px 18px;transition:opacity .2s,color .2s,border-color .2s}
  .geo-yes{background:var(--ink);color:var(--paper);border:1px solid var(--ink)}
  .geo-yes:hover{opacity:.86}
  .geo-no{background:transparent;color:var(--ink-mute);border:1px solid var(--rule)}
  .geo-no:hover{color:var(--ink);border-color:var(--ink-mute)}
  @media (prefers-reduced-motion:reduce){.geo-ask{animation:none;transition:none}}
  /* 「あの日⇄今日」の見比べ（開封画面から ?asof= 付きで来た時だけ現れる） */
  .cmp{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:4px;
    background:var(--paper-sunk);border:1px solid var(--rule);border-radius:24px;padding:4px;
    box-shadow:0 10px 26px -14px rgba(90,70,50,.55)}
  .cmp[hidden]{display:none}  /* display:flex が hidden 属性を上書きしないように */
  .cmp button{font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;font-size:12px;letter-spacing:0.08em;
    border:0;border-radius:20px;padding:7px 14px;background:transparent;color:var(--ink-mute);cursor:pointer;transition:background .2s,color .2s}
  .cmp button.on{background:var(--ink);color:var(--paper)}
  /* 開封の弧を辿る封蝋（雫ほどの小さな点） */
  .seal-dot{width:14px;height:14px;border-radius:50%;background:var(--seal);
    border:1px solid rgba(42,37,34,.55);box-shadow:0 2px 8px -2px rgba(90,70,50,.6)}
</style>
</head>
<body>
  <header>
    <div class="ttl">封をした場所<span class="romaji">Where sealed</span></div>
    <a class="back" href="/">もどる</a>
  </header>
  <div id="map"></div>

  <!-- 封をした日の地図と、今日の地図。開封画面から来た時だけ現れる切り替え -->
  <div class="cmp" id="cmp" hidden>
    <button class="on" data-side="then" id="cmpThen">あの日</button>
    <button data-side="now">今日</button>
  </div>

  <!-- 位置情報がまだ許されていない時だけ現れる、手紙からの小さな頼み -->
  <div class="geo-ask" id="geoAsk" hidden>
    <p>たよりは、<wbr>封をした場所を<wbr>しずかに<wbr>おぼえています。<br>
       いまの居場所を<wbr>知らせておくと、<wbr>つぎに封をしたとき、<wbr>その土地の名まえが<wbr>この地図に残ります。</p>
    <div class="geo-actions">
      <button class="geo-yes" id="geoYes">居場所を、たよりに知らせる</button>
      <button class="geo-no" id="geoNo">このままで</button>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{% if shademap_key %}
<script src="https://unpkg.com/leaflet-shadow-simulator@0.67.0/dist/leaflet-shadow-simulator.umd.min.js"
        integrity="sha256-HVrJNydQ6Xf1BD8GTWex+fgDuzm8+J0W8aUJ4CprUNU=" crossorigin=""></script>
{% endif %}
<script src="https://unpkg.com/@elfalem/leaflet-curve@0.9.2/dist/leaflet.curve.js"
        integrity="sha256-pSiawWAR4m6ldGRrvH2nPO+SgWvFC2PXruKgtP6LNNE=" crossorigin=""></script>
<script>
(async function(){
  const map=L.map('map',{zoomControl:true,attributionControl:true});
  // 下敷きはCarto Positron一枚（元から淡い。標準OSMだと彩度が残ってauraが埋もれる）。
  // かつては日本の範囲だけ国土地理院タイルを重ねていたが、国外では描けず層も煩雑になるため一本化した。
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19,subdomains:'abcd',
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  // ── moodペイン：tiles=200, overlay=400, marker=600, popup=700 の間（450）──
  // blend mode は各auraの要素側に付ける。ペインに付けるとスタッキングコンテキストが
  // 分離してタイルと合成されなくなる。ペイン全体はopacityだけで沈める。
  map.createPane('mood');
  const moodPane=map.getPane('mood');
  moodPane.style.zIndex=450;
  moodPane.style.pointerEvents='none';
  moodPane.style.opacity='0.55';

  // ── 日照のオーバーレイ（ShadeMap）：その時刻の光と影を地図にまとわせる ──
  // キーが無い・WebGLが使えない環境では黙って素の地図のまま（無くても地図は成立する）。
  // 「あの日⇄今日」の見比べでは、あの日の面に封をした瞬間の光を灯す（下のcmp切替と連動）。
  // 生成は view（中心・ズーム）が確定してから：view未設定の地図に addTo すると
  // ShadeMap の onAdd が getBounds() で「Set map center and zoom first」を投げるため、
  // 初期表示（frameAndIntro で fitBounds/setView した後）に initShade() で載せる。
  const SHADE_KEY={{ shademap_key|tojson }};
  let shadeMap=null, wantShadeDate=new Date();  // 載せる前に決まった日時は wantShadeDate に控える
  function initShade(){
    if(!SHADE_KEY||!window.ShadeMap||shadeMap)return;  // 無キー/未対応/既に載せ済みなら何もしない
    try{
      shadeMap=new ShadeMap({
        date:wantShadeDate,
        color:'#01112f',
        opacity:0.6,   // OSMが透けて見える濃さ。デザインレビューで調整余地あり
        apiKey:SHADE_KEY,
        terrainSource:{
          tileSize:256,maxZoom:15,
          // _overzoom を指定しないと影の描画格子が z15 止まりになり、街レベルまで
          // 寄った時にガタガタに粗くなる（タイル取得自体は maxZoom=15 のまま拡大補間）。
          _overzoom:18,
          getSourceUrl:({x,y,z})=>`https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${z}/${x}/${y}.png`,
          getElevation:({r,g,b})=>(r*256+g+b/256)-32768
        }
      }).addTo(map);
    }catch(e){shadeMap=null;}
  }
  // 載せる前の呼び出しは wantShadeDate に控えるだけ（initShade がその日時で起動する）
  function shadeDate(d){if(!d||isNaN(d))return;wantShadeDate=d;if(shadeMap){try{shadeMap.setDate(d);}catch(e){}}}

  // ── 色の解決 ──
  // circleMarker の fillColor に var() が効かないブラウザがあるので、CSS変数（color-mixの
  // ネスト含む）はダミー要素に当てて getComputedStyle で実色に解決してから渡す。
  const probe=document.createElement('span');
  document.body.appendChild(probe);
  function resolveColor(cssColor){
    probe.style.color=cssColor;
    return getComputedStyle(probe).color;
  }
  const PAPER=resolveColor('var(--paper)'),INK=resolveColor('var(--ink)'),
        INK_MUTE=resolveColor('var(--ink-mute)'),KRAFT=resolveColor('var(--kraft)');

  // ── 気分色の合成：OKLabでの逐次加重平均。変換はブラウザ（color-mix）に任せる ──
  // ネストの深さはサーバのサンプリング上限（8件）まで。8件あれば混色は十分収束する。
  const MOOD_VAR=m=>`var(--mood-${m})`;
  function blendMoods(moods){
    if(!moods||moods.length===0)return 'var(--mood-sealed)';
    return moods.map(MOOD_VAR).reduce((acc,c,i)=>
      i===0?c
           :`color-mix(in oklab, ${acc} ${(i/(i+1))*100}%, ${c})`
    );
  }

  // ── auraの半径：件数ではなくbboxの実寸から出す ──
  // 件数に紐づけると密度＝活動量の可視化になり、設計思想（件数を面積や濃度で表現しない）から外れる。
  function auraRadiusPx(map,area){
    const [sw,ne]=area.bbox;
    const a=map.latLngToLayerPoint(L.latLng(sw));
    const b=map.latLngToLayerPoint(L.latLng(ne));
    const diag=Math.hypot(b.x-a.x,b.y-a.y);
    return Math.min(Math.max(diag*0.58,64),260); // 下限64px 上限260px
  }

  // 点（とその上に載る線）はmarkerPane(z600)のSVGに描き、aura(450)より上へ出す
  const dotRenderer=L.svg({pane:'markerPane'});

  // ── moodレイヤー本体：エリアごとに aura + 未開封の輪 + 合成色の点 ──
  function createMoodLayer(list){
    const auraGroup=L.layerGroup();
    const dotGroup=L.layerGroup();
    const auras=[];
    const byLabel={};
    list.forEach(area=>{
      const color=blendMoods(area.moods);

      // aura（本人不在のクリック対象にしない：interactive:false・ペインもpointer-events:none）
      const el=document.createElement('div');
      el.className='mood-aura';
      el.style.setProperty('--aura-color',color);
      const icon=L.divIcon({html:el,className:'',iconSize:[0,0]});
      L.marker(area.center,{icon,pane:'mood',interactive:false,keyboard:false}).addTo(auraGroup);

      // 未開封の気配：auraとは別の、ごく薄い無彩色の輪（数は描かない）
      let ringEl=null;
      if(area.has_sealed){
        ringEl=document.createElement('div');
        ringEl.className='mood-sealed-ring';
        const ricon=L.divIcon({html:ringEl,className:'',iconSize:[0,0]});
        L.marker(area.center,{icon:ricon,pane:'mood',interactive:false,keyboard:false}).addTo(auraGroup);
      }

      // マーカー本体：紙色の細いリングを一枚挟むと、auraの上でも点が沈まない
      const dot=L.circleMarker(area.center,{
        renderer:dotRenderer,
        radius:5,
        color:PAPER,weight:1.5,opacity:1,
        fillColor:area.moods.length?resolveColor(color):resolveColor('var(--mood-sealed)'),
        fillOpacity:0.95,
        className:'mood-dot'
      }).addTo(dotGroup);
      dot.bindTooltip(area.label,{direction:'top',offset:[0,-8],className:'mood-tip'});

      auras.push({area,el,ringEl});
      byLabel[area.label]={el,color};
    });

    function resize(){
      if(!map._loaded)return;  // view確定前は測れない（frameAndIntro後に呼び直す）
      auras.forEach(({area,el,ringEl})=>{
        const r=auraRadiusPx(map,area);
        [el,ringEl].forEach(n=>{
          if(!n)return;
          n.style.width=`${r*2}px`;
          n.style.height=`${r*2}px`;
          n.style.marginLeft=`${-r}px`;
          n.style.marginTop=`${-r}px`;
        });
      });
    }
    map.on('zoomend',resize);
    resize();

    return {
      add(){auraGroup.addTo(map);dotGroup.addTo(map);resize();},
      remove(){map.removeLayer(auraGroup);map.removeLayer(dotGroup);},
      resize,byLabel,
      destroy(){map.off('zoomend',resize);}
    };
  }

  const BUCKET_JP={morning:'朝',day:'昼',evening:'夕',night:'夜'};
  const WX_JP={snow:'雪',rain:'雨',fog:'霧',cloud:'曇り',clear:'晴れ'};

  // 「2026.7.16 21:30」の形。時間の記録は簡素に、数字だけで。
  function fmtWhen(iso){
    if(!iso)return '';
    const d=new Date(iso);if(isNaN(d))return '';
    return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()+' '+
           d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function airLabel(when,bucket,wx){
    const parts=[];
    const w=fmtWhen(when);if(w)parts.push(w);
    if(BUCKET_JP[bucket])parts.push(BUCKET_JP[bucket]);
    if(wx&&WX_JP[wx.condition])parts.push(WX_JP[wx.condition]+(wx.temp!=null?' '+Math.round(wx.temp)+'℃':''));
    return parts.join(' · ');
  }
  function whisper(m,label){
    if(!label)return;
    m.bindTooltip(label,{direction:'top',offset:[0,-6],className:'area-tip',opacity:1});
    m.on('click',()=>m.openTooltip());  // タッチ端末でも触れたら囁く
  }

  // ?asof=<封をした日時> 付きで来たら「あの日の地図」と「今日の地図」の見比べモード。
  // どちらの地図も、いま（開封の瞬間）に取りにいく最新のデータから描く。
  const ASOF=((new URLSearchParams(location.search)).get('asof')||'').slice(0,19)||null;

  // エリアに集約済みのものだけを取りにいく（生座標・手紙id・件数はサーバから来ない）。
  // 開封の弧（?asof= の時だけ）には /api/map の点が要るので、その時だけ併せて取る。
  let areas=[],areasThen=null,points=[];
  try{
    const r=await fetch('/api/map/moods',{credentials:'same-origin'});
    if(r.status===401){location.href='/';return;}
    areas=((await r.json())||{}).areas||[];
    if(ASOF){
      const [r2,r3]=await Promise.all([
        fetch('/api/map/moods?until='+encodeURIComponent(ASOF),{credentials:'same-origin'}),
        fetch('/api/map',{credentials:'same-origin'})
      ]);
      if(r2.ok)areasThen=((await r2.json())||{}).areas||[];
      if(r3.ok)points=((await r3.json())||{}).points||[];
    }
  }catch(e){/* 取れなくても地図はそのまま（説明文は出さない） */}

  const REDUCE=window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches;

  const layerNow=createMoodLayer(areas);
  const layerThen=(ASOF&&areasThen)?createMoodLayer(areasThen):null;
  const currentLayer=L.layerGroup();   // 現在地は「今日」の地図の住人
  const latlngs=[];
  areas.forEach(a=>{latlngs.push(a.bbox[0],a.bbox[1]);});

  // ── 開封の一滴 ──
  // 開封画面から来た時、封をしていたエリアのauraを --mood-sealed から合成色へ0.9秒かけて
  // 落とす（封蝋を開ける演出の直後に、地図側で一滴落ちる形）。reduced-motionでは即時反映。
  let pendingDrop=null;
  function armDrop(){
    if(REDUCE||!ASOF)return;   // 動きを控える設定では、最初から合成色のまま
    const pt=points.find(q=>q.opened&&(q.sent_at||'').slice(0,19)===ASOF);
    const e=pt&&layerNow.byLabel[pt.area_name];
    if(!e)return;
    e.el.style.setProperty('--aura-color','var(--mood-sealed)');
    pendingDrop=e;
  }
  function performDrop(){
    if(!pendingDrop)return;
    const e=pendingDrop;pendingDrop=null;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      e.el.style.setProperty('--aura-color',e.color);
    }));
  }
  armDrop();

  if(layerThen){
    // まず「あの日」から。今日に切り替えると、その間に増えたエリア・開いた封の色が現れる。
    layerThen.add();
    shadeDate(new Date(ASOF));  // あの日の面には、封をした瞬間の光を
    const bar=document.getElementById('cmp');bar.hidden=false;
    const d=new Date(ASOF);
    if(!isNaN(d))document.getElementById('cmpThen').textContent=
      'あの日 · '+d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();
    bar.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      bar.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
      if(b.dataset.side==='now'){
        layerThen.remove();layerNow.add();currentLayer.addTo(map);
        shadeDate(new Date());
        performDrop();   // 今日の面をはじめて見た時に、一滴落ちる
      }else{
        layerNow.remove();map.removeLayer(currentLayer);layerThen.add();
        shadeDate(new Date(ASOF));
      }
    }));
  }else{
    layerNow.add();
    currentLayer.addTo(map);
  }

  function frameAndIntro(){
    if(latlngs.length){
      map.fitBounds(L.latLngBounds(latlngs),{padding:[48,48],maxZoom:14});
    }else{
      map.setView([30,15],2);  // まだ点がない時は、固定の静かな世界図
    }
    initShade();  // view が確定してから日照オーバーレイを載せる（未設定だと addTo が例外）
    layerNow.resize();if(layerThen)layerThen.resize();  // view確定後にauraの寸法を当てる
    drawOpeningArc();
    if(!layerThen)setTimeout(performDrop,2400);  // 見比べ無しの時：弧の演出が落ち着いた頃に一滴
  }
  // コンテナが高さ0のまま寄る（fitBounds）とズームが最大に張り付いて壊れる
  // （非表示タブでの復元・埋め込みブラウザ・プリレンダリング等）。
  // 高さが付くのを待ってから一度だけ実行する（付くまでは静かに待つ。急がない）。
  (function(){
    const el=document.getElementById('map');
    function attempt(){
      if(el.clientHeight<=0)return false;
      map.invalidateSize({animate:false});frameAndIntro();return true;
    }
    if(!attempt()){
      const iv=setInterval(()=>{if(attempt())clearInterval(iv);},200);
    }
  })();

  // ── 開封の弧：封をした場所と、開いた場所を、一本の弧で結ぶ ──
  // 開封画面から ?asof= 付きで来た時だけ、いちど。航空路線図のような放物線で
  // 「手紙が時間と場所を超えて届いた」ことを描く（収集や達成の演出ではない）。
  // 弧は面の切り替えでも消さない：あの日の点から今日の点へ、時間をまたぐ線だから。
  function drawOpeningArc(){
    if(!ASOF||typeof L.curve!=='function')return;
    // asof＝その手紙の封をした日時。手紙idは返さない原則のまま、日時で点を探す
    const p=points.find(q=>q.opened&&(q.sent_at||'').slice(0,19)===ASOF&&
                           q.open_area_lat!=null&&q.open_area_lng!=null&&
                           q.area_lat!=null&&q.area_lng!=null);
    if(!p)return;
    const sealed=[p.area_lat,p.area_lng],opened=[p.open_area_lat,p.open_area_lng];
    const meters=map.distance(sealed,opened);
    if(meters<200)return;  // 同じ土地の中なら弧は引かない（差分の「同じ土地」の言葉に任せる）
    // 弧の高さ：中点から垂直方向へ、2点間の35%。緯度経度の平面近似は長距離で歪むので、
    // 測地距離（メートル）が伸びるほど係数を絞り、国際間（日本⇄スペイン等）でも破綻させない
    const k=0.35/(1+meters/4.0e6);
    const dx=opened[1]-sealed[1],dy=opened[0]-sealed[0];
    const perp=[-dy,dx],plen=Math.hypot(perp[0],perp[1])||1;
    const off=Math.hypot(dx,dy)*k;
    const control=[
      Math.max(-85,Math.min(85,(sealed[0]+opened[0])/2+perp[0]/plen*off)),
      (sealed[1]+opened[1])/2+perp[1]/plen*off
    ];
    function bezier(t){
      const mt=1-t;
      return [mt*mt*sealed[0]+2*mt*t*control[0]+t*t*opened[0],
              mt*mt*sealed[1]+2*mt*t*control[1]+t*t*opened[1]];
    }
    // 弧の全体（両端と頂点）が見えるように寄り直す。上のfitBoundsより優先
    map.fitBounds(L.latLngBounds([sealed,opened,bezier(0.5)]),{padding:[56,56],maxZoom:13});
    const arc=L.curve(['M',sealed,'Q',control,opened],
      {renderer:dotRenderer,   // auraの下で滲まないよう、点と同じ面（markerPane）に引く
       color:INK_MUTE,weight:2,dashArray:'4,6',fill:false,opacity:0,interactive:false}).addTo(map);
    // 着いたあと：弧は薄く残り、開いた場所に耳色（kraft）の点が残る（触れると土地の名まえ）
    function settle(){
      arc.setStyle({opacity:0.45});
      const m=L.circleMarker(opened,{renderer:dotRenderer,radius:6,
        color:PAPER,weight:1.5,opacity:1,
        fillColor:KRAFT,fillOpacity:0.9,className:'mood-dot'}).addTo(map);
      whisper(m,p.open_area_name||'');
    }
    if(REDUCE){settle();return;}  // 動きを控える設定では、静かな弧と点だけ
    // 1. 弧がゆっくり現れ 2. 封蝋が弧を辿り 3. 着いた場所に点が残る（演出は一回きり）
    const sealIcon=L.divIcon({className:'',html:'<div class="seal-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]});
    const t0=performance.now(),FADE=600,FLY=1600;
    let flyer=null;
    function step(now){
      const el=now-t0;
      if(el<FADE){arc.setStyle({opacity:0.7*(el/FADE)});requestAnimationFrame(step);return;}
      if(!flyer){arc.setStyle({opacity:0.7});flyer=L.marker(sealed,{icon:sealIcon,interactive:false}).addTo(map);}
      const t=Math.min((el-FADE)/FLY,1);
      const e2=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;  // ゆっくり発って、ゆっくり着く
      flyer.setLatLng(bezier(e2));
      if(t<1){requestAnimationFrame(step);}
      else{map.removeLayer(flyer);settle();}
    }
    requestAnimationFrame(step);
  }

  // ── 現在地の点（青）：いまの日時・時間帯・天気をまとう ──
  // 位置の許可がある時だけ静かに現れる。座標は表示前に小数第3位へ丸める（生座標は描かない）。
  function timeBucket(){
    const h=new Date().getHours();
    if(h>=5&&h<11)return 'morning';
    if(h>=11&&h<17)return 'day';
    if(h>=17&&h<21)return 'evening';
    return 'night';
  }
  // 取得はLeaflet標準の map.locate に一本化。以前は getCurrentPosition の非同期の結果を
  // 待つ間に fitBounds が確定し、封じた点がある限り現在地へは寄らなかった（初期表示のバグ）。
  // いまは locationfound で必ず現在地周辺へ寄る（あの日⇄今日の見比べ中だけは弧の全景を優先）。
  // 座標は描く前に小数第3位へ丸める（生座標は描かない・憲法どおり）。
  // 拒否・失敗（locationerror）は無言：地図は封じた点の眺め（か、静かな世界図）のまま。
  const geoCard=document.getElementById('geoAsk');
  function hideGeoAsk(){
    if(geoCard&&!geoCard.hidden){geoCard.classList.add('bye');setTimeout(()=>{geoCard.hidden=true;},450);}
  }
  let currentShown=false;
  map.on('locationfound',async e=>{
    hideGeoAsk();
    if(currentShown)return;currentShown=true;
    const lat=Math.round(e.latlng.lat*1000)/1000,
          lng=Math.round(e.latlng.lng*1000)/1000;
    // 現在地は「今日」の地図の住人。あの日⇄今日の見比べでは、今日の側にだけ現れる。
    // 色は状態色を足さず墨一色（いま・ここに居る、という事実だけを描く）。
    L.circleMarker([lat,lng],{
      renderer:dotRenderer,radius:14,stroke:false,
      fillColor:INK,fillOpacity:0.12,
      interactive:false          // ハロー自体はクリック/ホバー判定を持たない
    }).addTo(currentLayer);
    const m=L.circleMarker([lat,lng],{
      renderer:dotRenderer,radius:7,color:PAPER,weight:1.5,opacity:1,
      fillColor:INK,fillOpacity:0.8,className:'mood-dot'
    }).addTo(currentLayer);
    if(!ASOF)map.setView([lat,lng],12);  // 現在地の周辺へ。エリア精度なので寄りすぎない
    let wx=null;
    try{
      const r=await fetch('/api/weather?lat='+e.latlng.lat+'&lon='+e.latlng.lng,{credentials:'same-origin'});
      const w=await r.json();
      if(w&&w.ok)wx={condition:w.condition,temp:w.temp};
    }catch(err){}
    whisper(m,airLabel(new Date().toISOString(),timeBucket(),wx));
  });
  map.on('locationerror',hideGeoAsk);  // 黙って引き下がる（エラーもトーストも出さない）
  function locateQuietly(){
    map.locate({setView:false,timeout:10000,maximumAge:600000,enableHighAccuracy:false});
  }
  // 既に許可されている時だけ黙って取りにいく（許可を求めるのは下の geoAsk カードの役目）
  if(navigator.geolocation&&navigator.permissions&&navigator.permissions.query){
    navigator.permissions.query({name:'geolocation'})
      .then(st=>{if(st.state==='granted')locateQuietly();})
      .catch(()=>{});
  }

  // ── 位置情報の許しがまだ無い時：手紙のことばで、そっと頼む ──
  // OS標準風の「位置情報をオンにしてください」は使わない。断られたら（応答が無くても）
  // エラーも文言も出さず、静かに引き下がる（憲法：拒否・失敗時は無言）。
  (function(){
    if(!geoCard||!navigator.geolocation)return;
    const show=()=>{geoCard.hidden=false;};
    if(navigator.permissions&&navigator.permissions.query){
      navigator.permissions.query({name:'geolocation'})
        .then(st=>{if(st.state!=='granted')show();})
        .catch(show);  // 判定できないブラウザでは、とりあえず頼んでみる
    }else{show();}
    // 頼みの結果は locationfound / locationerror が受け、カードもそこで下がる
    document.getElementById('geoYes').addEventListener('click',locateQuietly);
    document.getElementById('geoNo').addEventListener('click',hideGeoAsk);
  })();
})();
</script>
</body>
</html>
