{# 共通の <head> メタ。各ページから page_title / page_desc / robots / og_type を渡す。 #}
{# robots 既定は index,follow。非公開ページ(/open 等)はルート側で noindex を渡す。 #}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_desc }}">
<link rel="canonical" href="{{ canonical_url }}">
<meta name="robots" content="{{ robots | default('index,follow') }}">
{# アイコン/OG はキャッシュ更新用にバージョンを付ける。差し替え時はこの数字を上げる。 #}
{% set av = '2' %}
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v={{ av }}">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png?v={{ av }}">
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png?v={{ av }}">
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png?v={{ av }}">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#F2F1ED">
<meta name="apple-mobile-web-app-title" content="たより">

<meta property="og:site_name" content="tayori-たより-">
<meta property="og:locale" content="ja_JP">
<meta property="og:type" content="{{ og_type | default('website') }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_desc }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:image" content="{{ SITE_URL }}/static/og.png?v={{ av }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page_title }}">
<meta name="twitter:description" content="{{ page_desc }}">
<meta name="twitter:image" content="{{ SITE_URL }}/static/og.png?v={{ av }}">
